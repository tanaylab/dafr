name: bench

on:
  schedule:
    - cron: '17 4 1 * *'   # monthly, 1st of month at 04:17 UTC
  workflow_dispatch: {}

jobs:
  bench:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::cpp11, any::decor, any::bench, any::Matrix, any::withr, any::pkgload

      - name: Build
        run: Rscript -e 'pkgbuild::clean_dll(); pkgbuild::compile_dll(debug = FALSE)'

      - name: Run Slice 0 benchmarks
        run: Rscript -e 'pkgload::load_all(); source("inst/benchmarks/bench.R")' -- --small

      - uses: actions/upload-artifact@v4
        with:
          name: bench-csv
          path: dev/benchmarks/slice-0-baseline-*.csv
